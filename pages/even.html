<!DOCTYPE html>
<html lang="en">
<head>
    <title>Even Numbers</title>
   
</head>
<body>
    <p id="result"> </p>
     <script>
        var number =[1,2,8,7,9,11,100,50,60,67]
       var sum=0;
        
            for(var i=0; i<number.length;i++){
        
          if(number[i]%2==0)
        {
            sum=sum+number[i];
        }
    }
            document.getElementById("result").innerHTML="The sum of even numbers is: " + sum;   
        </script>
</body>
</html>
